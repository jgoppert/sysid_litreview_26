name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -e .

      - name: Validate benchmark setup
        run: ./results.py check-setup

      - name: Validate website bundle
        run: python3 site/check_site.py

      - name: Validate method entry points
        run: |
          python3 run.py frequency --help
          python3 run.py sindy --help

      - name: Validate synthetic 6DOF generation
        run: |
          python3 -m models.aircraft6dof.generate_dataset \
            --output /tmp/sysid_6dof_ci \
            --train-trials 1 \
            --validation-trials 1 \
            --duration 0.08 \
            --dt 0.02 \
            --no-plot
