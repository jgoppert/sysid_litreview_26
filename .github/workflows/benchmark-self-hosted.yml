name: Self-Hosted GPU Benchmark

on:
  workflow_dispatch:
    inputs:
      dataset_modes:
        description: "Space-separated dataset modes, or all"
        default: "all"
        required: true
      include_methods:
        description: "Space-separated methods, or all"
        default: "all"
        required: true
      jobs:
        description: "Parallel worker processes"
        default: "30"
        required: true
      max_gpu_workers:
        description: "Maximum concurrent GPU-training methods"
        default: "2"
        required: true
      regenerate_datasets:
        description: "Regenerate simulation datasets before benchmarking"
        type: boolean
        default: false
      build_pdf:
        description: "Build latex/main.pdf after regenerating assets"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: self-hosted-gpu-benchmark
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: [self-hosted, linux, x64, gpu]
    timeout-minutes: 720
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify NVIDIA GPU
        run: nvidia-smi

      - name: Install Python dependencies
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e ".[gpu]" --index-url https://download.pytorch.org/whl/cu128 --extra-index-url https://pypi.org/simple

      - name: Verify PyTorch CUDA
        run: |
          .venv/bin/python - <<'PY'
          import torch
          print("torch", torch.__version__)
          print("cuda_available", torch.cuda.is_available())
          if not torch.cuda.is_available():
              raise SystemExit("CUDA is not available to PyTorch")
          print("device", torch.cuda.get_device_name(0))
          PY

      - name: Resolve benchmark inputs
        id: inputs
        run: |
          DATASET_MODES="${{ inputs.dataset_modes }}"
          if [ "$DATASET_MODES" = "all" ]; then
            DATASET_MODES="open_loop sine_sweep aggressive trim_grid open_loop_safe sine_sweep_safe aggressive_safe safe_loop"
          fi
          INCLUDE_METHODS="${{ inputs.include_methods }}"
          echo "dataset_modes=$DATASET_MODES" >> "$GITHUB_OUTPUT"
          echo "include_methods=$INCLUDE_METHODS" >> "$GITHUB_OUTPUT"

      - name: Regenerate datasets
        if: ${{ inputs.regenerate_datasets }}
        run: |
          ./results.py simulate \
            --dataset-modes ${{ steps.inputs.outputs.dataset_modes }} \
            --state-source both \
            --input-channel u_cmd

      - name: Run benchmark suite
        run: |
          ./results.py suite \
            --dataset-modes ${{ steps.inputs.outputs.dataset_modes }} \
            --include-methods ${{ steps.inputs.outputs.include_methods }} \
            --state-source both \
            --input-channel u_cmd \
            --device cuda \
            --jobs ${{ inputs.jobs }} \
            --threads-per-worker 1 \
            --max-gpu-workers ${{ inputs.max_gpu_workers }} \
            --progress-interval 30

      - name: Export paper and web assets
        run: |
          ./results.py latex-assets
          ./results.py web-data

      - name: Build paper
        if: ${{ inputs.build_pdf }}
        run: ./results.py build

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: |
            results
            latex/tables
            latex/fig
            site/public/data
            latex/generated
            latex/fig/generated_*
            latex/main.pdf
          if-no-files-found: ignore
